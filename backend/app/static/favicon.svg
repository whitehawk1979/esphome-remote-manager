<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- ESP32 Chip Icon -->
  <defs>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#6b46c1"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#1a1a2e"/>
  
  <!-- Chip body -->
  <rect x="8" y="8" width="16" height="16" rx="2" fill="url(#chipGrad)"/>
  
  <!-- Chip pins -->
  <rect x="6" y="10" width="2" height="2" fill="#4a90d9"/>
  <rect x="6" y="14" width="2" height="2" fill="#4a90d9"/>
  <rect x="6" y="18" width="2" height="2" fill="#4a90d9"/>
  <rect x="24" y="10" width="2" height="2" fill="#6b46c1"/>
  <rect x="24" y="14" width="2" height="2" fill="#6b46c1"/>
  <rect x="24" y="18" width="2" height="2" fill="#6b46c1"/>
  <rect x="10" y="6" width="2" height="2" fill="#4a90d9"/>
  <rect x="14" y="6" width="2" height="2" fill="#4a90d9"/>
  <rect x="18" y="6" width="2" height="2" fill="#4a90d9"/>
  <rect x="10" y="24" width="2" height="2" fill="#6b46c1"/>
  <rect x="14" y="24" width="2" height="2" fill="#6b46c1"/>
  <rect x="18" y="24" width="2" height="2" fill="#6b46c1"/>
  
  <!-- WiFi symbol -->
  <path d="M16 18 L12 14 A6 6 0 0 1 20 14 Z" fill="#fff" opacity="0.8"/>
  <path d="M16 15 L14 13 A3 3 0 0 1 18 13 Z" fill="#fff" opacity="0.9"/>
  <circle cx="16" cy="16" r="1.5" fill="#fff"/>
</svg>