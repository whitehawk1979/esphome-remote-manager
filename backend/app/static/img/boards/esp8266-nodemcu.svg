<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- ESP8266 NodeMCU Board Image -->
  <defs>
    <linearGradient id="boardGrad8266" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d2691e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b4513;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chipGrad8266" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Board Background -->
  <rect x="80" y="20" width="240" height="260" rx="10" fill="url(#boardGrad8266)" stroke="#333" stroke-width="2"/>
  
  <!-- Main Chip (ESP-12E/F) -->
  <rect x="150" y="80" width="100" height="70" rx="3" fill="url(#chipGrad8266)" stroke="#555" stroke-width="1"/>
  <text x="200" y="115" text-anchor="middle" fill="#ccc" font-family="Arial, sans-serif" font-size="10" font-weight="bold">ESP8266</text>
  <text x="200" y="130" text-anchor="middle" fill="#999" font-family="Arial, sans-serif" font-size="8">ESP-12E/F</text>
  
  <!-- WiFi Antenna Area -->
  <path d="M250,80 Q270,90 265,120 Q260,150 250,150" stroke="#888" stroke-width="1" fill="none"/>
  <text x="260" y="100" fill="#666" font-family="Arial, sans-serif" font-size="6">WiFi</text>
  
  <!-- USB-Micro Connector -->
  <rect x="185" y="265" width="30" height="12" rx="2" fill="#555" stroke="#777" stroke-width="1"/>
  <text x="200" y="290" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="6">Micro-USB</text>
  
  <!-- Reset/Flash Buttons -->
  <rect x="100" y="250" width="20" height="12" rx="2" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="110" y="275" text-anchor="middle" fill="#777" font-family="Arial, sans-serif" font-size="5">RST</text>
  
  <rect x="280" y="250" width="20" height="12" rx="2" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="290" y="275" text-anchor="middle" fill="#777" font-family="Arial, sans-serif" font-size="5">FLASH</text>
  
  <!-- LED Indicator -->
  <circle cx="320" cy="240" r="4" fill="#0066ff" opacity="0.9"/>
  <text x="320" y="255" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="5">LED</text>
  
  <!-- Pin Headers (Left Side) -->
  <g fill="#ffd700" stroke="#b8860b" stroke-width="0.5">
    <rect x="85" y="30" width="8" height="4"/>
    <rect x="85" y="45" width="8" height="4"/>
    <rect x="85" y="60" width="8" height="4"/>
    <rect x="85" y="75" width="8" height="4"/>
    <rect x="85" y="90" width="8" height="4"/>
    <rect x="85" y="105" width="8" height="4"/>
    <rect x="85" y="120" width="8" height="4"/>
    <rect x="85" y="135" width="8" height="4"/>
    <rect x="85" y="150" width="8" height="4"/>
    <rect x="85" y="165" width="8" height="4"/>
    <rect x="85" y="180" width="8" height="4"/>
    <rect x="85" y="195" width="8" height="4"/>
    <rect x="85" y="210" width="8" height="4"/>
    <rect x="85" y="225" width="8" height="4"/>
    <rect x="85" y="240" width="8" height="4"/>
  </g>
  
  <!-- Pin Headers (Right Side) -->
  <g fill="#ffd700" stroke="#b8860b" stroke-width="0.5">
    <rect x="307" y="30" width="8" height="4"/>
    <rect x="307" y="45" width="8" height="4"/>
    <rect x="307" y="60" width="8" height="4"/>
    <rect x="307" y="75" width="8" height="4"/>
    <rect x="307" y="90" width="8" height="4"/>
    <rect x="307" y="105" width="8" height="4"/>
    <rect x="307" y="120" width="8" height="4"/>
    <rect x="307" y="135" width="8" height="4"/>
    <rect x="307" y="150" width="8" height="4"/>
    <rect x="307" y="165" width="8" height="4"/>
    <rect x="307" y="180" width="8" height="4"/>
    <rect x="307" y="195" width="8" height="4"/>
    <rect x="307" y="210" width="8" height="4"/>
    <rect x="307" y="225" width="8" height="4"/>
    <rect x="307" y="240" width="8" height="4"/>
  </g>
  
  <!-- Pin Labels (Left) -->
  <g fill="#ddd" font-family="monospace" font-size="5">
    <text x="97" y="34">A0</text>
    <text x="97" y="49">GND</text>
    <text x="97" y="64">VV</text>
    <text x="97" y="79">D13</text>
    <text x="97" y="94">D12</text>
    <text x="97" y="109">D14</text>
    <text x="97" y="124">D16</text>
    <text x="97" y="139">EN</text>
    <text x="97" y="154">RST</text>
    <text x="97" y="169">3V3</text>
    <text x="97" y="184">GND</text>
    <text x="97" y="199">D15</text>
    <text x="97" y="214">D2</text>
    <text x="97" y="229">D0</text>
    <text x="97" y="244">D4</text>
  </g>
  
  <!-- Pin Labels (Right) -->
  <g fill="#ddd" font-family="monospace" font-size="5">
    <text x="300" y="34" text-anchor="end">D1</text>
    <text x="300" y="49" text-anchor="end">D3</text>
    <text x="300" y="64" text-anchor="end">SD1</text>
    <text x="300" y="79" text-anchor="end">SD0</text>
    <text x="300" y="94" text-anchor="end">CLK</text>
    <text x="300" y="109" text-anchor="end">D5</text>
    <text x="300" y="124" text-anchor="end">D6</text>
    <text x="300" y="139" text-anchor="end">D7</text>
    <text x="300" y="154" text-anchor="end">D8</text>
    <text x="300" y="169" text-anchor="end">D9</text>
    <text x="300" y="184" text-anchor="end">D10</text>
    <text x="300" y="199" text-anchor="end">VIN</text>
    <text x="300" y="214" text-anchor="end">GND</text>
    <text x="300" y="229" text-anchor="end">3V3</text>
    <text x="300" y="244" text-anchor="end">GND</text>
  </g>
  
  <!-- Board Title -->
  <text x="200" y="200" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">NodeMCU ESP8266</text>
  <text x="200" y="215" text-anchor="middle" fill="#ddd" font-family="Arial, sans-serif" font-size="8">v1.0 / v2.0 / v3.0</text>
</svg>