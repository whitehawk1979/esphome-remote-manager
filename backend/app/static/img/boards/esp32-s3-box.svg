<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- ESP32-S3-BOX Board Image -->
  <defs>
    <linearGradient id="boardGradBox" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="caseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#222;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Case/Enclosure -->
  <rect x="40" y="40" width="320" height="200" rx="12" fill="url(#caseGrad)" stroke="#555" stroke-width="2"/>
  
  <!-- Screen/Display -->
  <rect x="60" y="60" width="160" height="120" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <rect x="70" y="70" width="140" height="100" rx="2" fill="#0a1628" stroke="#1a3a5c" stroke-width="1"/>
  <text x="140" y="125" text-anchor="middle" fill="#3a7bd5" font-family="monospace" font-size="10">ESPHome</text>
  <text x="140" y="140" text-anchor="middle" fill="#2a5a9a" font-family="monospace" font-size="8">Ready</text>
  
  <!-- Speaker Grille -->
  <g fill="#1a1a1a">
    <rect x="250" y="70" width="90" height="4"/>
    <rect x="250" y="80" width="90" height="4"/>
    <rect x="250" y="90" width="90" height="4"/>
    <rect x="250" y="100" width="90" height="4"/>
    <rect x="250" y="110" width="90" height="4"/>
  </g>
  <text x="295" y="130" text-anchor="middle" fill="#555" font-family="Arial, sans-serif" font-size="7">Speaker</text>
  
  <!-- ESP32-S3 Module -->
  <rect x="250" y="150" width="80" height="50" rx="3" fill="#1a472a" stroke="#2d5a3d" stroke-width="1"/>
  <text x="290" y="175" text-anchor="middle" fill="#aaa" font-family="Arial, sans-serif" font-size="8" font-weight="bold">ESP32-S3</text>
  <text x="290" y="188" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="6">WROOM-1</text>
  
  <!-- Buttons -->
  <circle cx="70" cy="200" r="8" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="70" y="220" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="5">BOOT</text>
  
  <circle cx="100" cy="200" r="8" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="100" y="220" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="5">RST</text>
  
  <!-- USB-C Port -->
  <rect x="180" y="240" width="40" height="10" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="200" y="265" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="6">USB-C</text>
  
  <!-- Antenna Symbol -->
  <g transform="translate(330, 80)">
    <path d="M0,0 L10,20 L20,0" stroke="#3a7bd5" stroke-width="2" fill="none"/>
    <line x1="10" y1="20" x2="10" y2="30" stroke="#3a7bd5" stroke-width="2"/>
  </g>
  
  <!-- LED -->
  <circle cx="60" cy="55" r="3" fill="#00ff00" opacity="0.8"/>
  
  <!-- Board Title -->
  <text x="200" y="30" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">ESP32-S3-BOX</text>
</svg>