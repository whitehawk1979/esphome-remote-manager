<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- ESP8266 Wemos D1 Mini Board Image -->
  <defs>
    <linearGradient id="boardGradD1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1f35;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chipGradD1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Board Background -->
  <rect x="100" y="20" width="200" height="260" rx="6" fill="url(#boardGradD1)" stroke="#333" stroke-width="2"/>
  
  <!-- Main Chip (ESP-12F) -->
  <rect x="160" y="80" width="80" height="60" rx="3" fill="url(#chipGradD1)" stroke="#555" stroke-width="1"/>
  <text x="200" y="105" text-anchor="middle" fill="#ccc" font-family="Arial, sans-serif" font-size="9" font-weight="bold">ESP8266</text>
  <text x="200" y="120" text-anchor="middle" fill="#999" font-family="Arial, sans-serif" font-size="7">ESP-12F</text>
  
  <!-- WiFi Antenna -->
  <path d="M240,80 Q255,90 252,110 Q250,130 240,140" stroke="#555" stroke-width="1" fill="none"/>
  
  <!-- USB-Micro Connector -->
  <rect x="185" y="265" width="30" height="10" rx="2" fill="#444" stroke="#666" stroke-width="1"/>
  <text x="200" y="290" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="6">Micro-USB</text>
  
  <!-- Reset Button -->
  <circle cx="120" cy="250" r="6" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="120" y="272" text-anchor="middle" fill="#777" font-family="Arial, sans-serif" font-size="5">RST</text>
  
  <!-- LED -->
  <circle cx="280" cy="250" r="4" fill="#0066ff" opacity="0.9"/>
  <text x="280" y="268" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="5">LED</text>
  
  <!-- Pin Headers (Left Side) -->
  <g fill="#c0c0c0" stroke="#888" stroke-width="0.5">
    <rect x="105" y="30" width="8" height="4"/>
    <rect x="105" y="50" width="8" height="4"/>
    <rect x="105" y="70" width="8" height="4"/>
    <rect x="105" y="90" width="8" height="4"/>
    <rect x="105" y="110" width="8" height="4"/>
    <rect x="105" y="130" width="8" height="4"/>
    <rect x="105" y="150" width="8" height="4"/>
    <rect x="105" y="170" width="8" height="4"/>
    <rect x="105" y="190" width="8" height="4"/>
    <rect x="105" y="210" width="8" height="4"/>
    <rect x="105" y="230" width="8" height="4"/>
  </g>
  
  <!-- Pin Headers (Right Side) -->
  <g fill="#c0c0c0" stroke="#888" stroke-width="0.5">
    <rect x="287" y="30" width="8" height="4"/>
    <rect x="287" y="50" width="8" height="4"/>
    <rect x="287" y="70" width="8" height="4"/>
    <rect x="287" y="90" width="8" height="4"/>
    <rect x="287" y="110" width="8" height="4"/>
    <rect x="287" y="130" width="8" height="4"/>
    <rect x="287" y="150" width="8" height="4"/>
    <rect x="287" y="170" width="8" height="4"/>
    <rect x="287" y="190" width="8" height="4"/>
    <rect x="287" y="210" width="8" height="4"/>
    <rect x="287" y="230" width="8" height="4"/>
  </g>
  
  <!-- Pin Labels (Left) -->
  <g fill="#aaa" font-family="monospace" font-size="5">
    <text x="118" y="34">RST</text>
    <text x="118" y="54">A0</text>
    <text x="118" y="74">D0</text>
    <text x="118" y="94">D5</text>
    <text x="118" y="114">D6</text>
    <text x="118" y="134">D7</text>
    <text x="118" y="154">D8</text>
    <text x="118" y="174">3V3</text>
    <text x="118" y="194">TX</text>
    <text x="118" y="214">RX</text>
    <text x="118" y="234">GND</text>
  </g>
  
  <!-- Pin Labels (Right) -->
  <g fill="#aaa" font-family="monospace" font-size="5">
    <text x="280" y="34" text-anchor="end">D4</text>
    <text x="280" y="54" text-anchor="end">D3</text>
    <text x="280" y="74" text-anchor="end">D2</text>
    <text x="280" y="94" text-anchor="end">D1</text>
    <text x="280" y="114" text-anchor="end">5V</text>
    <text x="280" y="134" text-anchor="end">GND</text>
    <text x="280" y="154" text-anchor="end">VIN</text>
    <text x="280" y="174" text-anchor="end">3V3</text>
    <text x="280" y="194" text-anchor="end">D0</text>
    <text x="280" y="214" text-anchor="end">SCL</text>
    <text x="280" y="234" text-anchor="end">SDA</text>
  </g>
  
  <!-- Additional Components Area -->
  <rect x="130" y="160" width="60" height="30" rx="2" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="160" y="178" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="5">Flash</text>
  
  <rect x="210" y="160" width="60" height="30" rx="2" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="240" y="178" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="5">USB-TTL</text>
  
  <!-- Board Title -->
  <text x="200" y="225" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Wemos D1 Mini</text>
  <text x="200" y="240" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="7">ESP8266EX</text>
</svg>