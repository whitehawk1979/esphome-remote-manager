<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- ESP32-S3-DevKitC-1 Board Image -->
  <defs>
    <linearGradient id="boardGradS3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chipGradS3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3d3d3d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Board Background -->
  <rect x="50" y="30" width="300" height="240" rx="8" fill="url(#boardGradS3)" stroke="#333" stroke-width="2"/>
  
  <!-- Main Chip (ESP32-S3-WROOM-1) -->
  <rect x="130" y="90" width="140" height="100" rx="4" fill="url(#chipGradS3)" stroke="#555" stroke-width="1"/>
  <text x="200" y="135" text-anchor="middle" fill="#ccc" font-family="Arial, sans-serif" font-size="12" font-weight="bold">ESP32-S3</text>
  <text x="200" y="152" text-anchor="middle" fill="#999" font-family="Arial, sans-serif" font-size="9">WROOM-1</text>
  <text x="200" y="168" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="7">Dual Core • WiFi • BLE 5</text>
  
  <!-- USB-C Connector -->
  <rect x="180" y="250" width="40" height="15" rx="3" fill="#555" stroke="#777" stroke-width="1"/>
  <text x="200" y="278" text-anchor="middle" fill="#aaa" font-family="Arial, sans-serif" font-size="7">USB-C</text>
  
  <!-- USB-OTG -->
  <rect x="80" y="250" width="30" height="15" rx="3" fill="#444" stroke="#666" stroke-width="1"/>
  <text x="95" y="278" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="6">OTG</text>
  
  <!-- Antenna Area -->
  <rect x="280" y="90" width="50" height="70" rx="2" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="305" y="130" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="7">ANT</text>
  
  <!-- LED Indicators -->
  <circle cx="80" cy="260" r="3" fill="#00ff00" opacity="0.9"/>
  <circle cx="95" cy="260" r="3" fill="#0066ff" opacity="0.9"/>
  <text x="87" y="278" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="5">RGB</text>
  
  <!-- Pin Headers (Left Side) -->
  <g fill="#ffd700" stroke="#b8860b" stroke-width="0.5">
    <rect x="55" y="35" width="8" height="3"/>
    <rect x="55" y="45" width="8" height="3"/>
    <rect x="55" y="55" width="8" height="3"/>
    <rect x="55" y="65" width="8" height="3"/>
    <rect x="55" y="75" width="8" height="3"/>
    <rect x="55" y="85" width="8" height="3"/>
    <rect x="55" y="95" width="8" height="3"/>
    <rect x="55" y="105" width="8" height="3"/>
    <rect x="55" y="115" width="8" height="3"/>
    <rect x="55" y="125" width="8" height="3"/>
    <rect x="55" y="135" width="8" height="3"/>
    <rect x="55" y="145" width="8" height="3"/>
    <rect x="55" y="155" width="8" height="3"/>
    <rect x="55" y="165" width="8" height="3"/>
    <rect x="55" y="175" width="8" height="3"/>
    <rect x="55" y="185" width="8" height="3"/>
    <rect x="55" y="195" width="8" height="3"/>
    <rect x="55" y="205" width="8" height="3"/>
    <rect x="55" y="215" width="8" height="3"/>
  </g>
  
  <!-- Pin Headers (Right Side) -->
  <g fill="#ffd700" stroke="#b8860b" stroke-width="0.5">
    <rect x="337" y="35" width="8" height="3"/>
    <rect x="337" y="45" width="8" height="3"/>
    <rect x="337" y="55" width="8" height="3"/>
    <rect x="337" y="65" width="8" height="3"/>
    <rect x="337" y="75" width="8" height="3"/>
    <rect x="337" y="85" width="8" height="3"/>
    <rect x="337" y="95" width="8" height="3"/>
    <rect x="337" y="105" width="8" height="3"/>
    <rect x="337" y="115" width="8" height="3"/>
    <rect x="337" y="125" width="8" height="3"/>
    <rect x="337" y="135" width="8" height="3"/>
    <rect x="337" y="145" width="8" height="3"/>
    <rect x="337" y="155" width="8" height="3"/>
    <rect x="337" y="165" width="8" height="3"/>
    <rect x="337" y="175" width="8" height="3"/>
    <rect x="337" y="185" width="8" height="3"/>
    <rect x="337" y="195" width="8" height="3"/>
    <rect x="337" y="205" width="8" height="3"/>
    <rect x="337" y="215" width="8" height="3"/>
  </g>
  
  <!-- Pin Labels (Left) - GPIO 0-19 -->
  <g fill="#aaa" font-family="monospace" font-size="4">
    <text x="67" y="38">3V3</text>
    <text x="67" y="48">EN</text>
    <text x="67" y="58">D0</text>
    <text x="67" y="68">D1</text>
    <text x="67" y="78">D2</text>
    <text x="67" y="88">D3</text>
    <text x="67" y="98">D4</text>
    <text x="67" y="108">D5</text>
    <text x="67" y="118">D6</text>
    <text x="67" y="128">D7</text>
    <text x="67" y="138">D8</text>
    <text x="67" y="148">D9</text>
    <text x="67" y="158">D10</text>
    <text x="67" y="168">D11</text>
    <text x="67" y="178">D12</text>
    <text x="67" y="188">D13</text>
    <text x="67" y="198">D14</text>
    <text x="67" y="208">D15</text>
    <text x="67" y="218">GND</text>
  </g>
  
  <!-- Pin Labels (Right) - GPIO 20-48 -->
  <g fill="#aaa" font-family="monospace" font-size="4">
    <text x="330" y="38" text-anchor="end">D48</text>
    <text x="330" y="48" text-anchor="end">D47</text>
    <text x="330" y="58" text-anchor="end">D46</text>
    <text x="330" y="68" text-anchor="end">D45</text>
    <text x="330" y="78" text-anchor="end">D44</text>
    <text x="330" y="88" text-anchor="end">D43</text>
    <text x="330" y="98" text-anchor="end">D42</text>
    <text x="330" y="108" text-anchor="end">D41</text>
    <text x="330" y="118" text-anchor="end">D40</text>
    <text x="330" y="128" text-anchor="end">D39</text>
    <text x="330" y="138" text-anchor="end">D38</text>
    <text x="330" y="148" text-anchor="end">D37</text>
    <text x="330" y="158" text-anchor="end">D36</text>
    <text x="330" y="168" text-anchor="end">D35</text>
    <text x="330" y="178" text-anchor="end">D34</text>
    <text x="330" y="188" text-anchor="end">D33</text>
    <text x="330" y="198" text-anchor="end">D21</text>
    <text x="330" y="208" text-anchor="end">D20</text>
    <text x="330" y="218" text-anchor="end">5V</text>
  </g>
  
  <!-- Board Title -->
  <text x="200" y="210" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">ESP32-S3-DevKitC-1</text>
  <text x="200" y="225" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="8">Espressif</text>
</svg>