<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- ESP32-C3-DevKitM-1 Board Image -->
  <defs>
    <linearGradient id="boardGradC3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#151515;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chipGradC3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a472a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2818;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Board Background -->
  <rect x="70" y="40" width="260" height="220" rx="6" fill="url(#boardGradC3)" stroke="#444" stroke-width="2"/>
  
  <!-- Main Chip (ESP32-C3-MINI-1) -->
  <rect x="150" y="90" width="100" height="80" rx="4" fill="url(#chipGradC3)" stroke="#2d5a3d" stroke-width="1"/>
  <text x="200" y="125" text-anchor="middle" fill="#ccc" font-family="Arial, sans-serif" font-size="11" font-weight="bold">ESP32-C3</text>
  <text x="200" y="142" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="8">MINI-1</text>
  <text x="200" y="156" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="6">RISC-V • WiFi • BLE 5</text>
  
  <!-- USB-C Connector -->
  <rect x="180" y="248" width="40" height="12" rx="3" fill="#444" stroke="#666" stroke-width="1"/>
  <text x="200" y="275" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="7">USB-C</text>
  
  <!-- Antenna -->
  <rect x="260" y="90" width="40" height="50" rx="2" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="280" y="120" text-anchor="middle" fill="#555" font-family="Arial, sans-serif" font-size="6">ANT</text>
  
  <!-- LEDs -->
  <circle cx="90" cy="250" r="3" fill="#ff0000" opacity="0.8"/>
  <circle cx="105" cy="250" r="3" fill="#00ff00" opacity="0.8"/>
  <circle cx="120" cy="250" r="3" fill="#0000ff" opacity="0.8"/>
  <text x="105" y="270" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="5">RGB</text>
  
  <!-- BOOT Button -->
  <circle cx="300" cy="250" r="6" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="300" y="270" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="5">BOOT</text>
  
  <!-- Pin Headers (Left Side) -->
  <g fill="#ffd700" stroke="#b8860b" stroke-width="0.5">
    <rect x="75" y="50" width="8" height="3"/>
    <rect x="75" y="62" width="8" height="3"/>
    <rect x="75" y="74" width="8" height="3"/>
    <rect x="75" y="86" width="8" height="3"/>
    <rect x="75" y="98" width="8" height="3"/>
    <rect x="75" y="110" width="8" height="3"/>
    <rect x="75" y="122" width="8" height="3"/>
    <rect x="75" y="134" width="8" height="3"/>
    <rect x="75" y="146" width="8" height="3"/>
    <rect x="75" y="158" width="8" height="3"/>
    <rect x="75" y="170" width="8" height="3"/>
    <rect x="75" y="182" width="8" height="3"/>
    <rect x="75" y="194" width="8" height="3"/>
    <rect x="75" y="206" width="8" height="3"/>
    <rect x="75" y="218" width="8" height="3"/>
  </g>
  
  <!-- Pin Headers (Right Side) -->
  <g fill="#ffd700" stroke="#b8860b" stroke-width="0.5">
    <rect x="317" y="50" width="8" height="3"/>
    <rect x="317" y="62" width="8" height="3"/>
    <rect x="317" y="74" width="8" height="3"/>
    <rect x="317" y="86" width="8" height="3"/>
    <rect x="317" y="98" width="8" height="3"/>
    <rect x="317" y="110" width="8" height="3"/>
    <rect x="317" y="122" width="8" height="3"/>
    <rect x="317" y="134" width="8" height="3"/>
    <rect x="317" y="146" width="8" height="3"/>
    <rect x="317" y="158" width="8" height="3"/>
    <rect x="317" y="170" width="8" height="3"/>
    <rect x="317" y="182" width="8" height="3"/>
    <rect x="317" y="194" width="8" height="3"/>
    <rect x="317" y="206" width="8" height="3"/>
    <rect x="317" y="218" width="8" height="3"/>
  </g>
  
  <!-- Pin Labels (Left) -->
  <g fill="#aaa" font-family="monospace" font-size="4.5">
    <text x="88" y="53">3V3</text>
    <text x="88" y="65">EN</text>
    <text x="88" y="77">D4</text>
    <text x="88" y="89">D5</text>
    <text x="88" y="101">D6</text>
    <text x="88" y="113">D7</text>
    <text x="88" y="125">D8</text>
    <text x="88" y="137">D9</text>
    <text x="88" y="149">D10</text>
    <text x="88" y="161">D18</text>
    <text x="88" y="173">D19</text>
    <text x="88" y="185">D20</text>
    <text x="88" y="197">D21</text>
    <text x="88" y="209">GND</text>
    <text x="88" y="221">5V</text>
  </g>
  
  <!-- Pin Labels (Right) -->
  <g fill="#aaa" font-family="monospace" font-size="4.5">
    <text x="312" y="53" text-anchor="end">D0</text>
    <text x="312" y="65" text-anchor="end">D1</text>
    <text x="312" y="77" text-anchor="end">D2</text>
    <text x="312" y="89" text-anchor="end">D3</text>
    <text x="312" y="101" text-anchor="end">RX</text>
    <text x="312" y="113" text-anchor="end">TX</text>
    <text x="312" y="125" text-anchor="end">D12</text>
    <text x="312" y="137" text-anchor="end">D13</text>
    <text x="312" y="149" text-anchor="end">D14</text>
    <text x="312" y="161" text-anchor="end">D15</text>
    <text x="312" y="173" text-anchor="end">D16</text>
    <text x="312" y="185" text-anchor="end">D17</text>
    <text x="312" y="197" text-anchor="end">D22</text>
    <text x="312" y="209" text-anchor="end">D23</text>
    <text x="312" y="221" text-anchor="end">GND</text>
  </g>
  
  <!-- Board Title -->
  <text x="200" y="200" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="10" font-weight="bold">ESP32-C3-DevKitM-1</text>
  <text x="200" y="215" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="7">Espressif</text>
</svg>